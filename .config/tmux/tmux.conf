set -g prefix C-Space
set -g mode-keys vi
set -sa terminal-overrides ",xterm*:Tc"

# Window Numbering
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Status Bar
set -g status-position top
set -g status-justify absolute-centre
set -g status-right ' #S '
set -g status-left ''

set -g status-style 'fg=white bg=default'
set -g message-style 'fg=default bg=default'

set -g status-right-style 'fg=brightblack bg=default'
set -g window-status-style 'fg=brightblack bg=default'
set -g window-status-current-style 'fg=white bg=default'
set -g window-status-current-format ' #I:#W '
set -g window-status-format ' #I:#W '

# Keybinds
bind r source-file "~/.config/tmux/tmux.conf"
bind-key f run-shell "tmux neww ~/.local/bin/sessionizer.sh"
